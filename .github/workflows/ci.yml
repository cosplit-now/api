name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: cosplit-api-test
        ports:
          - 55432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d cosplit-api-test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: valkey/valkey:8
        ports:
          - 56379:6379
        options: >-
          --health-cmd="valkey-cli ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:55432/cosplit-api-test
      BETTER_AUTH_SECRET: test-secret-key-32-characters-minimum!!
      BETTER_AUTH_URL: http://localhost:3000/auth
      REDIS_HOST: localhost
      REDIS_PORT: 56379
      R2_ACCOUNT_ID: test
      R2_ACCESS_KEY_ID: test
      R2_SECRET_ACCESS_KEY: test
      R2_BUCKET: test-bucket

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: E2E tests
        run: npm run test:e2e
